services:
  redis:
    image: redis/redis-stack:latest
    container_name: redis-rag
    ports:
      - "63790:6379"
      - "63791:8001"  # RedisInsight (UI)
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: .
    container_name: drag-api
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./fontes:/app/fontes
      - ./services:/app/services
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
