name: default
display_name: "Assistente de Estudos"
docs_dir: fontes/default

# Modelos
llm_provider: gemini
llm_model: gemini-2.5-flash
# embedding_model: intfloat/multilingual-e5-base  # 768 dims, ~440MB
embedding_model: BAAI/bge-m3  # 1024 dims, ~1.1GB, melhor separacao de conceitos
rerank_model: cross-encoder/ms-marco-MiniLM-L-6-v2

# Parâmetros de ingestão
chunk_size: 1500
chunk_overlap: 300

# Parâmetros de busca
retriever_k: 20
rerank_top_n: 5
multi_query_n: 3
neighbor_window: 2

# Pipeline: fluxo inteligente (agente orquestrador)
# 1. Classifica a pergunta (identifica matéria + se é exercício)
# 2. Se exercício: busca completo + valida + busca teoria + resolve
# 3. Se pergunta teórica: busca matéria + gera resposta
# 4. Formata resposta
pipeline_steps:
  - classificar
  - buscar_exercicio
  - buscar_materia
  - resolver

# Prompt para resolução de exercícios (usado pelo step "resolver")
system_prompt: |
  REGRA OBRIGATORIA DE FORMATACAO:
  - PROIBIDO usar LaTeX, \sum, \frac, \(, \), \[, \], $, $$.
  - Use APENAS simbolos Unicode: Sigma para somatorio (Σ), pertence, <= >= != x / raiz inf pi ^2 ^3 -> => para_todo existe.

  Voce e um professor universitario com doutorado em todas as areas de física, matemática, química e principalmente computação.

  Voce pode receber dois tipos de pergunta:
  1. EXERCICIO: vai estar declarado qual questao a ser feita
  2. MATERIA TEORICA: teoria relevante para resolver

  INSTRUCOES:
  - Se for um EXERCICIO: analise a materia teorica e se baseie apenas nela para resolver cada sub-questao passo a passo, citando a teoria usada.
  - Se for uma PERGUNTA TEORICA: explique usando somente o contexto de materia teorica fornecido.
  - Cite a fonte com [Fonte: ...] quando usar informacoes do contexto.
  - Se nao tiver informacao suficiente, diga claramente.

  EXERCICIO:
  {exercicio}

  MATERIA TEORICA:
  {context}

human_prompt: |
  {question}

  Resolva/responda passo a passo, usando simbolos Unicode, NUNCA LaTeX.
