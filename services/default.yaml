name: default
display_name: "Assistente de Estudos"
docs_dir: fontes/default

# Modelos
llm_provider: gemini
llm_model: gemini-2.5-flash
# embedding_model: intfloat/multilingual-e5-base  # 768 dims, ~440MB
embedding_model: BAAI/bge-m3  # 1024 dims, ~1.1GB, melhor separacao de conceitos
rerank_model: cross-encoder/ms-marco-MiniLM-L-6-v2

# Modelos disponíveis para seleção na UI
available_models:
  - provider: gemini
    model: gemini-2.5-flash
    label: "Gemini 2.5 Flash"
  - provider: claude
    model: claude-sonnet-4-6
    label: "Claude Sonnet 4.6"
  - provider: ollama
    model: qwen2.5:14b
    label: "Qwen 2.5 14B"

# Parâmetros de ingestão
chunk_size: 2500
chunk_overlap: 500

# Parâmetros de busca
retriever_k: 20
rerank_top_n: 5
multi_query_n: 3
neighbor_window: 2

# Pipeline: fluxo inteligente (agente orquestrador)
# 1. Classifica a pergunta (identifica matéria + se é exercício)
# 2. Se exercício: busca completo + valida + busca teoria + resolve
# 3. Se pergunta teórica: busca matéria + gera resposta
# 4. Formata resposta
pipeline_steps:
  - classificar
  - buscar_exercicio
  - buscar_materia
  - resolver

# Prompt do sistema (identidade e regras) e prompt do usuario (dados + pergunta)
system_prompt: |
  Voce e um professor universitario com doutorado, especialista. Voce sempre explica com analogias, exemplos e sempre preza pelo rigor cientifico . Responda sempre em portugues.

  COMPORTAMENTO:
  - Resolva passo a passo, justificando cada etapa com a teoria fornecida.
  - Cite a fonte com [Fonte: ...] ao usar informacoes do contexto.
  - Se o contexto fornecido nao for suficiente, diga claramente o que falta.
  - Nao invente informacoes alem do contexto fornecido.

human_prompt: |
  EXERCICIO:
  {exercicio}

  MATERIA TEORICA RELEVANTE:
  {context}

  PERGUNTA DO ALUNO:
  {question}

  Resolva/responda passo a passo.
