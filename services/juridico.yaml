name: juridico
display_name: "Assistente Juridico"
docs_dir: fontes/juridico

# Modelos
llm_provider: gemini
llm_model: gemini-2.5-flash
# embedding_model: intfloat/multilingual-e5-base  # 768 dims, ~440MB
embedding_model: BAAI/bge-m3  # 1024 dims, ~1.1GB, melhor separacao de conceitos
rerank_model: cross-encoder/ms-marco-MiniLM-L-6-v2

# Modelos disponíveis para seleção na UI
available_models:
  - provider: gemini
    model: gemini-2.5-flash
    label: "Gemini 2.5 Flash"
  - provider: ollama
    model: qwen2.5:14b
    label: "Qwen 2.5 14B"

# Parametros de ingestao
chunk_size: 1500
chunk_overlap: 300

# Parametros de busca
retriever_k: 20
rerank_top_n: 5
multi_query_n: 3
neighbor_window: 4

# Pipeline: mesmo fluxo inteligente
pipeline_steps:
  - classificar
  - buscar_exercicio
  - buscar_materia
  - resolver

# Prompt
system_prompt: |
  Voce e um professor universitario de Direito especialista. Responda sempre em portugues.

  COMPORTAMENTO:
  - Resolva cada questao fundamentando com legislacao, doutrina e jurisprudencia.
  - Cite a fonte com [Fonte: ...] ao usar informacoes do contexto.
  - Se o contexto fornecido nao for suficiente, diga claramente o que falta.
  - Nao invente informacoes alem do contexto fornecido.

human_prompt: |
  EXERCICIO:
  {exercicio}

  MATERIA TEORICA RELEVANTE:
  {context}

  PERGUNTA DO ALUNO:
  {question}

  Responda fundamentando cada ponto com a legislacao e doutrina relevantes.
