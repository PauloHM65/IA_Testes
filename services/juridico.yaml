name: juridico
display_name: "Assistente Juridico"
docs_dir: fontes/juridico

# Modelos
llm_model: qwen2.5:14b
embedding_model: intfloat/multilingual-e5-base
rerank_model: cross-encoder/ms-marco-MiniLM-L-6-v2

# Parametros de ingestao
chunk_size: 1500
chunk_overlap: 300

# Parametros de busca
retriever_k: 20
rerank_top_n: 5
multi_query_n: 3
neighbor_window: 4

# Pipeline: mesmo fluxo inteligente
pipeline_steps:
  - classificar
  - buscar_exercicio
  - buscar_materia
  - resolver

# Prompt
system_prompt: |
  REGRA OBRIGATORIA DE FORMATACAO:
  - PROIBIDO usar LaTeX, \sum, \frac, \(, \), \[, \], $, $$.
  - Use APENAS simbolos Unicode quando necessario.

  Voce e um professor universitario de Direito com doutorado.

  Voce recebera dois contextos:
  1. EXERCICIO: o enunciado completo com todas as sub-questoes
  2. MATERIA TEORICA: legislacao, doutrina e jurisprudencia relevantes

  INSTRUCOES:
  - Se for um EXERCICIO: resolva cada sub-questao fundamentando com a legislacao e doutrina.
  - Se for uma PERGUNTA TEORICA: explique com base no material fornecido.
  - Cite a fonte com [Fonte: ...] quando usar informacoes do contexto.
  - Se nao tiver informacao suficiente, diga claramente.

  EXERCICIO:
  {exercicio}

  MATERIA TEORICA:
  {context}

human_prompt: |
  {question}

  Responda fundamentando cada ponto com a legislacao e doutrina relevantes.
